# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
name: Doctor CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build Eureka Server
      run: mvn -B package --file HABMS-EurekaServer/pom.xml

    - name: Build Config Server
      run: mvn -B package --file HABMS-ConfigServer/pom.xml

    - name: Build API Gateway
      run: mvn -B package --file HABMS-SpringCloudAPIGateway/pom.xml

    - name: Build Doctor Service
      run: mvn -B package --file Doctor-Service/pom.xml

    - name: Build Patient Service
      run: mvn -B package --file Patient-Service/pom.xml

    - name: Build Appointment Service
      run: mvn -B package --file Appointment-Service/pom.xml

    - name: Build Billing Service
      run: mvn -B package --file Billing-Service/pom.xml  

  # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
